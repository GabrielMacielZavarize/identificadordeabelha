# Docker Compose para Oracle Always Free (VM.Standard.A1.Flex — ARM64)
#
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.oracle.yml up -d
#
# Diferenças do prod.yml:
#   - 1 worker (ARM tem 4 OCPUs mas compartilhados — conservador)
#   - CORS e uploads apontam para o IP público da VM
#   - Porta 80 exposta pelo frontend via nginx interno do Vite preview
#
# Antes de usar:
#   1. Defina VM_IP no shell: export VM_IP=$(curl -sf http://ifconfig.me)
#   2. Crie o .env a partir do .env.example e ajuste os caminhos
#   3. docker compose -f docker-compose.yml -f docker-compose.oracle.yml up -d --build

services:
  backend:
    command: >
      uvicorn beeai.api.main:app
      --host 0.0.0.0
      --port 8000
      --workers 1
      --app-dir src
    environment:
      BEEAI_DEBUG: "false"
      BEEAI_DATABASE_URL: "sqlite:////app/data/db/app.sqlite3"
      BEEAI_UPLOAD_DIR: "/app/data/uploads"
      BEEAI_ARTIFACTS_DIR: "/app/artifacts/models"
      BEEAI_CORS_ORIGINS: '["http://${VM_IP}"]'
      BEEAI_UPLOADS_BASE_URL: "http://${VM_IP}:8000"
      BEEAI_MAX_UPLOAD_SIZE_MB: "15"
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    command: sh -c "npm run build && npm run preview -- --host 0.0.0.0 --port 4173"
    environment:
      VITE_API_BASE_URL: "http://${VM_IP}:8000/api/v1"
    ports:
      - "80:4173"
    restart: unless-stopped

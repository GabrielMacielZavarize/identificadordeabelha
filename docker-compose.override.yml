services:
  backend:
    build:
      network: host
    command: uvicorn beeai.api.main:app --host 0.0.0.0 --port 8000 --reload --app-dir src
    environment:
      BEEAI_DEBUG: "true"
      BEEAI_DATABASE_URL: sqlite:////app/data/db/app.sqlite3
      BEEAI_UPLOAD_DIR: /app/data/uploads
      BEEAI_ARTIFACTS_DIR: /app/artifacts/models
      BEEAI_CORS_ORIGINS: '["http://localhost:5173"]'
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app/backend

  frontend:
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend

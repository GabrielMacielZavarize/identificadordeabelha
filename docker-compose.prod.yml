services:
  backend:
    command: uvicorn beeai.api.main:app --host 0.0.0.0 --port 8000 --workers 2 --app-dir src
    environment:
      BEEAI_DEBUG: "false"
      BEEAI_DATABASE_URL: sqlite:////app/data/db/app.sqlite3
      BEEAI_UPLOAD_DIR: /app/data/uploads
      BEEAI_ARTIFACTS_DIR: /app/artifacts/models
      BEEAI_CORS_ORIGINS: '["http://localhost"]'
      BEEAI_UPLOADS_BASE_URL: http://localhost:8000
    ports:
      - "8000:8000"

  frontend:
    command: sh -c "npm run build && npm run preview -- --host 0.0.0.0 --port 4173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "80:4173"

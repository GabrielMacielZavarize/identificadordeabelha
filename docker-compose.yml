services:
  backend:
    build:
      context: ./backend
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - huggingface_cache:/root/.cache/huggingface

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend

volumes:
  frontend_node_modules:
  huggingface_cache:
